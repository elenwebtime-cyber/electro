<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Запись на Электроэпиляцию</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Подключаем Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background-color: #0a0a0a; 
      color: white; 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior: none; 
      user-select: none; 
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    input, textarea, select {
      user-select: auto; 
      -webkit-user-select: auto;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glass-card-dark { 
      background: rgba(30, 30, 30, 0.4); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
    }

    /* Надежная анимация для летящих сердечек */
    @keyframes floatUpAnim {
      0% { transform: translateY(10vh) scale(0.8); opacity: 0; }
      10% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-80vh) scale(1.5); opacity: 0; }
    }
    .heart-float {
      animation-name: floatUpAnim;
      animation-timing-function: ease-in;
      animation-iteration-count: infinite;
      animation-fill-mode: both;
    }

    @keyframes loaderSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes loaderSpinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes loaderPulse {
      0%, 100% { opacity: 0.5; transform: scale(0.92); }
      50% { opacity: 1; transform: scale(1); }
    }
    .boot-loader-shell {
      max-width: 28rem;
      margin: 0 auto;
      min-height: 100dvh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(200, 157, 124, 0.16), rgba(10, 10, 10, 0.98) 58%),
        #0a0a0a;
      position: relative;
      overflow: hidden;
    }
    .boot-loader {
      position: relative;
      width: 122px;
      height: 122px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 26px rgba(200, 157, 124, 0.28));
    }
    .boot-loader__halo {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(200, 157, 124, 0.18) 0%, rgba(200, 157, 124, 0.05) 38%, transparent 70%);
      animation: loaderPulse 2.4s ease-in-out infinite;
    }
    .boot-loader__ring {
      position: absolute;
      border-radius: 999px;
      box-sizing: border-box;
      border: 3px solid transparent;
    }
    .boot-loader__ring--outer {
      width: 108px;
      height: 108px;
      border-top-color: #e8cdb5;
      border-right-color: #c89d7c;
      animation: loaderSpin 1.05s linear infinite;
    }
    .boot-loader__ring--inner {
      width: 72px;
      height: 72px;
      border-bottom-color: rgba(232, 205, 181, 0.95);
      border-left-color: rgba(154, 106, 69, 0.95);
      animation: loaderSpinReverse 1.35s linear infinite;
    }
    .boot-loader__core {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f0decf 0%, #c89d7c 55%, #9a6a45 100%);
      box-shadow: 0 0 18px rgba(200, 157, 124, 0.55), inset 0 0 6px rgba(0, 0, 0, 0.3);
    }
    .boot-loader__text {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      color: #c89d7c;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.26em;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(200, 157, 124, 0.35);
      animation: loaderPulse 2s ease-in-out infinite;
    }
  </style>
  <script>
    // Броня от подглядывания и просмотра кода
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', event => {
      if (event.keyCode === 123 || 
         (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || 
         (event.ctrlKey && event.keyCode === 85) || 
         (event.ctrlKey && event.keyCode === 67) || 
         (event.metaKey && event.altKey && event.keyCode === 73)) { 
          event.preventDefault();
      }
    });
  </script>
</head>
<body class="bg-[#0a0a0a] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-900 via-[#0a0a0a] to-black font-sans selection:bg-[#C89D7C]/30">
  
  <div id="root">
    <div class="boot-loader-shell">
      <div class="boot-loader">
        <div class="boot-loader__halo"></div>
        <div class="boot-loader__ring boot-loader__ring--outer"></div>
        <div class="boot-loader__ring boot-loader__ring--inner"></div>
        <div class="boot-loader__core"></div>
        <p class="boot-loader__text">ЗАГРУЗКА</p>
      </div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================================
    // ⚠️ ВАЖНЫЕ НАСТРОЙКИ - ЗАПОЛНИТЕ ЭТИ ПОЛЯ СВОИМИ ДАННЫМИ! ⚠️
    // =========================================================================

    const ADMIN_TG_ID = 758556732; 
    
    // 🔥 ВОТ ОНА НАША БРОНЯ! Ссылка на сервер Гугла, никаких токенов!
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNGMR366TWwfE1iO7VvF8uGsCXRsDeHY9rt03EI_-OowgLxQ08omNQXJOi4stkRsFK/exec";
    
    const CHAT_ID = "758556732"; 

    const FB_API_KEY_PART_1 = "AIzaSyBBRpR83YK7"; 
    const FB_API_KEY_PART_2 = "J1VSvolRR-Lny4tQ6mqnoHA"; 
    
    const firebaseConfig = {
      apiKey: FB_API_KEY_PART_1 + FB_API_KEY_PART_2,
      authDomain: "myelectro-58686.firebaseapp.com", 
      projectId: "myelectro-58686", 
      storageBucket: "myelectro-58686.firebasestorage.app", 
      messagingSenderId: "1090810182956", 
      appId: "1:1090810182956:web:900e7a2fd0d86087a64089" 
    };

    if (!firebase.apps.length && firebaseConfig.projectId !== "ВАШ_ПРОЕКТ") {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.apps.length ? firebase.firestore() : null;

    if (db) {
      try {
        db.settings({ experimentalForceLongPolling: true });
      } catch(e) {}
    }

    // =========================================================================
    // ПОДУШКА БЕЗОПАСНОСТИ (ERROR BOUNDARY)
    // =========================================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      componentDidCatch(error, errorInfo) {
        console.error("Критическая ошибка:", error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-[100dvh] bg-[#0a0a0a] flex flex-col items-center justify-center p-6 text-center animate-[fadeIn_0.3s_ease-out]">
               <div className="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mb-6 border border-red-500/30">
                  <span className="text-4xl">⚠️</span>
               </div>
               <h2 className="text-2xl font-bold text-white mb-2">Ой! Системная ошибка</h2>
               <p className="text-sm text-gray-400 mb-8 max-w-[280px]">
                  Возможно в настройки попал невидимый спецсимвол.
               </p>
               <button onClick={() => {
                  localStorage.removeItem('electroAppData');
                  window.location.reload();
               }} className="bg-gradient-to-r from-[#C89D7C] to-[#9A6A45] text-black font-bold py-4 px-8 rounded-2xl shadow-[0_5px_15px_rgba(200,157,124,0.3)] hover:opacity-90 transition-opacity">
                 Сбросить кэш и починить
               </button>
            </div>
          );
        }
        return this.props.children; 
      }
    }

    // =========================================================================

    const triggerHaptic = () => {
      try {
        if (window.Telegram?.WebApp?.HapticFeedback?.impactOccurred) {
          window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        } else if (window.Telegram?.WebApp?.HapticFeedback?.selectionChanged) {
          window.Telegram.WebApp.HapticFeedback.selectionChanged();
        } else if (navigator.vibrate) {
          navigator.vibrate(80);
        }
      } catch (e) { console.log(e); }
    };

    const Icon = ({ name, className }) => {
      const icons = {
        MapPin: <g><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></g>,
        Info: <g><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></g>,
        Clock: <g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
        CheckCircle2: <g><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></g>,
        ChevronLeft: <g><path d="m15 18-6-6 6-6"/></g>,
        Heart: <g><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></g>,
        Sparkles: <g><path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3z"/></g>,
        AlertCircle: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
        Settings: <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51-1Z"/></g>
      };
      const style = name === 'Heart' ? { fill: 'currentColor' } : {};
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} overflow="visible" style={style}>
          {icons[name]}
        </svg>
      );
    };

    // =========================================================================
    // КАСТОМНЫЕ ПРЕМИУМ КОМПОНЕНТЫ С PORTAL (для точного центрирования)
    // =========================================================================

    const GlassSelect = ({ value, options, onChange, placeholder, disabled }) => {
        const [isOpen, setIsOpen] = useState(false);
        const selectedLabel = options.find(o => o.value === value)?.label || value;

        const modalContent = isOpen && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]" onClick={(e) => { e.stopPropagation(); setIsOpen(false); }}>
                <div onClick={e => e.stopPropagation()} className="w-full max-w-md bg-[#1A1A1A]/95 backdrop-blur-xl border border-[#C89D7C]/30 rounded-3xl p-2 shadow-[0_10px_40px_rgba(0,0,0,0.5)] max-h-[60vh] flex flex-col">
                    <div className="flex justify-between items-center mb-2 mt-2 px-4">
                        <span className="text-gray-400 text-sm font-bold">{placeholder}</span>
                        <button onClick={() => setIsOpen(false)} className="w-8 h-8 bg-black/50 rounded-full text-white font-bold pb-1 flex items-center justify-center">×</button>
                    </div>
                    <div className="overflow-y-auto hide-scrollbar flex-1 pb-4 px-2 space-y-2 mt-2" style={{ touchAction: 'pan-y', WebkitOverflowScrolling: 'touch' }}>
                        {options.map(opt => (
                            <div key={opt.value} onClick={() => { onChange(opt.value); setIsOpen(false); triggerHaptic(); }} className={`p-4 rounded-xl text-center font-medium cursor-pointer transition-all ${value === opt.value ? 'bg-gradient-to-r from-[#C89D7C] to-[#9A6A45] text-black shadow-lg' : 'bg-[#2A2A2A] text-white hover:bg-[#333]'}`}>
                                {opt.label}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        return (
            <div className="flex-1 relative">
                <div onClick={(e) => { if(!disabled) { e.stopPropagation(); setIsOpen(true); } }} className={`w-full bg-[#2A2A2A] border border-gray-700 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-[#C89D7C] flex justify-between items-center cursor-pointer transition-colors ${disabled ? 'opacity-50' : 'hover:border-gray-500'}`}>
                    <span className="truncate">{selectedLabel || placeholder}</span>
                    <Icon name="ChevronLeft" className={`w-4 h-4 transition-transform -rotate-90 text-gray-400`} />
                </div>
                {isOpen && ReactDOM.createPortal(modalContent, document.body)}
            </div>
        );
    };

    const GlassTimePicker = ({ value, onChange, disabled }) => {
      const [isOpen, setIsOpen] = useState(false);
      
      const [hour, setHour] = useState(() => (typeof value === 'string' && value.includes(':') ? value.split(':')[0] : '14'));
      const [minute, setMinute] = useState(() => (typeof value === 'string' && value.includes(':') ? value.split(':')[1] : '00'));
      
      const hours = Array.from({length: 13}, (_, i) => String(i + 9).padStart(2, '0'));
      const minutes = ['00', '05', '10', '15', '20', '25', '30', '35', '40', '45', '50', '55'];

      const hourRef = useRef(null);
      const minRef = useRef(null);

      useEffect(() => {
        if (isOpen) {
            setHour(typeof value === 'string' && value.includes(':') ? value.split(':')[0] : '14');
            setMinute(typeof value === 'string' && value.includes(':') ? value.split(':')[1] : '00');
        }
      }, [isOpen, value]);

      useEffect(() => {
          if (isOpen && hourRef.current && minRef.current) {
              const hIdx = hours.indexOf(hour);
              const mIdx = minutes.indexOf(minute);
              setTimeout(() => {
                  if(hourRef.current) hourRef.current.scrollTop = (hIdx !== -1 ? hIdx : 0) * 50;
                  if(minRef.current) minRef.current.scrollTop = (mIdx !== -1 ? mIdx : 0) * 50;
              }, 10);
          }
      }, [isOpen]);

      const handleScroll = (ref, arr, setter) => {
          if (!ref.current) return;
          const idx = Math.round(ref.current.scrollTop / 50);
          if (arr[idx]) setter(arr[idx]);
      };

      const modalContent = isOpen && (
          <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]" onClick={(e) => { e.stopPropagation(); setIsOpen(false); }}>
            <div onClick={e => e.stopPropagation()} className="w-full max-w-md bg-[#1A1A1A]/95 backdrop-blur-xl border border-[#C89D7C]/30 rounded-3xl p-6 shadow-[0_10px_40px_rgba(0,0,0,0.5)]">
              <div className="flex justify-between items-center mb-6">
                <button onClick={() => { setIsOpen(false); triggerHaptic(); }} className="text-gray-400 font-medium px-2 py-1">Отмена</button>
                <h3 className="text-white font-bold text-lg">Выбор времени</h3>
                <button onClick={() => { onChange(`${hour}:${minute}`); setIsOpen(false); triggerHaptic(); }} className="text-[#C89D7C] font-bold px-2 py-1">Готово</button>
              </div>
              
              <div className="flex justify-center gap-4 relative h-[150px] mb-4">
                <div className="absolute top-1/2 -translate-y-1/2 left-4 right-4 h-[50px] bg-white/5 border-y border-[#C89D7C]/30 rounded-lg pointer-events-none z-0"></div>
                
                <div className="w-24 h-full overflow-y-auto hide-scrollbar snap-y snap-mandatory relative z-10" ref={hourRef} onScroll={() => handleScroll(hourRef, hours, setHour)} style={{ touchAction: 'pan-y', WebkitOverflowScrolling: 'touch' }}>
                  <div className="h-[50px]"></div>
                  {hours.map(h => (
                    <div key={h} className={`h-[50px] flex items-center justify-center snap-center text-3xl font-bold transition-colors ${hour === h ? 'text-[#C89D7C]' : 'text-gray-600'}`}>{h}</div>
                  ))}
                  <div className="h-[50px]"></div>
                </div>
                
                <div className="flex items-center justify-center text-3xl font-bold text-white z-10 h-full pb-1">:</div>
                
                <div className="w-24 h-full overflow-y-auto hide-scrollbar snap-y snap-mandatory relative z-10" ref={minRef} onScroll={() => handleScroll(minRef, minutes, setMinute)} style={{ touchAction: 'pan-y', WebkitOverflowScrolling: 'touch' }}>
                  <div className="h-[50px]"></div>
                  {minutes.map(m => (
                    <div key={m} className={`h-[50px] flex items-center justify-center snap-center text-3xl font-bold transition-colors ${minute === m ? 'text-[#C89D7C]' : 'text-gray-600'}`}>{m}</div>
                  ))}
                  <div className="h-[50px]"></div>
                </div>
              </div>
            </div>
          </div>
      );

      return (
        <div className="flex-1 relative">
          <div onClick={(e) => { if(!disabled) { e.stopPropagation(); setIsOpen(true); } }} className={`w-full bg-[#2A2A2A] border border-gray-700 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-[#C89D7C] flex justify-between items-center cursor-pointer transition-colors ${disabled ? 'opacity-50' : 'hover:border-gray-500'}`}>
            <span className="truncate">{value || 'Время...'}</span>
            <Icon name="Clock" className="w-4 h-4 text-gray-400" />
          </div>
          {isOpen && ReactDOM.createPortal(modalContent, document.body)}
        </div>
      );
    };

    const GlassDurationPicker = ({ value, onChange, disabled }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [mins, setMins] = useState(Number(value) || 30);
      const durations = Array.from({length: 36}, (_, i) => (i + 1) * 10);

      const listRef = useRef(null);

      useEffect(() => {
        if (isOpen) {
            setMins(Number(value) || 30);
        }
      }, [isOpen, value]);

      useEffect(() => {
          if (isOpen && listRef.current) {
              const idx = durations.indexOf(mins);
              setTimeout(() => {
                  if(listRef.current) listRef.current.scrollTop = (idx !== -1 ? idx : 0) * 50;
              }, 10);
          }
      }, [isOpen]);

      const handleScroll = () => {
          if (!listRef.current) return;
          const idx = Math.round(listRef.current.scrollTop / 50);
          if (durations[idx]) setMins(durations[idx]);
      };

      const modalContent = isOpen && (
          <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]" onClick={(e) => { e.stopPropagation(); setIsOpen(false); }}>
            <div onClick={e => e.stopPropagation()} className="w-full max-w-md bg-[#1A1A1A]/95 backdrop-blur-xl border border-[#C89D7C]/30 rounded-3xl p-6 shadow-[0_10px_40px_rgba(0,0,0,0.5)]">
              <div className="flex justify-between items-center mb-6">
                <button onClick={() => { setIsOpen(false); triggerHaptic(); }} className="text-gray-400 font-medium px-2 py-1">Отмена</button>
                <h3 className="text-white font-bold text-lg">Длительность</h3>
                <button onClick={() => { onChange(mins); setIsOpen(false); triggerHaptic(); }} className="text-[#C89D7C] font-bold px-2 py-1">Готово</button>
              </div>
              
              <div className="flex justify-center relative h-[150px] mb-4">
                <div className="absolute top-1/2 -translate-y-1/2 left-10 right-10 h-[50px] bg-white/5 border-y border-[#C89D7C]/30 rounded-lg pointer-events-none z-0"></div>
                
                <div className="w-32 h-full overflow-y-auto hide-scrollbar snap-y snap-mandatory relative z-10" ref={listRef} onScroll={handleScroll} style={{ touchAction: 'pan-y', WebkitOverflowScrolling: 'touch' }}>
                  <div className="h-[50px]"></div>
                  {durations.map(d => (
                    <div key={d} className={`h-[50px] flex items-center justify-center snap-center text-3xl font-bold transition-colors ${mins === d ? 'text-[#C89D7C]' : 'text-gray-600'}`}>
                      {d}
                    </div>
                  ))}
                  <div className="h-[50px]"></div>
                </div>

    const toSafeString = (v, fallback = '') => {
      if (v === null || v === undefined) return fallback;

    // УНИВЕРСАЛЬНЫЙ ПАРСЕР И ФОРМАТТЕР ДЛЯ НОВОГО СТАНДАРТА ДАТ (YYYY-MM-DD)
    const parseDateForDisplay = (dateStr) => {
        if (!dateStr) return { day: '', month: '', year: '', short: '', full: '' };
        if (dateStr.includes('-')) {
           const [y, m, d] = dateStr.split('-');
           const mNames = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
           const dayNum = parseInt(d).toString();
           const monthName = mNames[parseInt(m) - 1];
           return { day: dayNum, month: monthName, year: y, short: `${dayNum} ${monthName}`, full: `${dayNum} ${monthName} ${y}` };
        }
        // Защита: парсим старый формат "5 Мар", если он все же проскочит
        const parts = dateStr.split(' ');
        return { day: parts[0] || '', month: parts[1] || '', year: parts[2] || new Date().getFullYear().toString(), short: parts.slice(0,2).join(' '), full: dateStr };
    };

    const generateCalendarDays = () => {

      for(let i=0; i<365; i++) {
         const d = new Date(today);
         d.setDate(today.getDate() + i);
         const isoDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
         days.push({
           date: isoDate,
           day: weekDays[d.getDay()]
         });
      }
      return days;
    };

    // ==========================================
    // УМНОЕ УДАЛЕНИЕ ПЕРЕКРЫВАЮЩИХСЯ СЛОТОВ (АЛГОРИТМ ИЗ ОБРАЗЦА)
    // ==========================================
    const removeOverlappingSlots = (slots, startTime, durationMins) => {
      if (!startTime || typeof startTime !== 'string') return slots || [];
      const parts = startTime.split(':');
      if (parts.length !== 2) return slots || [];
      
      const [h, m] = parts.map(Number);
      const startMins = h * 60 + m;
      const endMins = startMins + durationMins;
      
      return (slots || []).filter(time => {
          if (!time || typeof time !== 'string') return false;
          const [th, tm] = time.split(':').map(Number);
          const tMins = (th || 0) * 60 + (tm || 0);
          return tMins < startMins || tMins >= endMins;
      });
    };

    // ==========================================
    // УМНОЕ ВОССТАНОВЛЕНИЕ СЛОТОВ ПРИ ОТМЕНЕ/РЕДАКТИРОВАНИИ
    // ==========================================
    const restoreOverlappingSlots = (currentSlots, startTime, durationMins, templateSlots) => {
      if (!startTime || typeof startTime !== 'string') return currentSlots || [];
      const parts = startTime.split(':');
      if (parts.length !== 2) return currentSlots || [];
      
      const [h, m] = parts.map(Number);
      const startMins = h * 60 + m;
      const endMins = startMins + durationMins;
      
      const newSlots = new Set(currentSlots || []);
      newSlots.add(startTime); // Обязательно возвращаем начальное время
      
      // Возвращаем слоты из шаблона, которые были "съедены" этой записью
      (templateSlots || []).forEach(t => {
          if (!t || typeof t !== 'string') return;
          const [th, tm] = t.split(':').map(Number);
          const tMins = (th || 0) * 60 + (tm || 0);
          if (tMins > startMins && tMins < endMins) {
              newSlots.add(t);
          }
      });
      
      return Array.from(newSlots).sort();
    };

    const formatPhoneNumber = (value) => {
      if (!value) return '';
      const phoneNumber = value.replace(/[^\d]/g, '');
      if (phoneNumber.length === 0) return '';
      
      if (['7', '8', '9'].includes(phoneNumber[0])) {
          let res = '+7 ';
          const core = phoneNumber[0] === '9' ? phoneNumber : phoneNumber.slice(1);
          if (core.length === 0) return res;
          if (core.length < 4) return res + '(' + core;
          if (core.length < 7) return res + '(' + core.slice(0, 3) + ') ' + core.slice(3);
          if (core.length < 9) return res + '(' + core.slice(0, 3) + ') ' + core.slice(3, 6) + '-' + core.slice(6);
          return res + '(' + core.slice(0, 3) + ') ' + core.slice(3, 6) + '-' + core.slice(6, 8) + '-' + core.slice(8, 10);
      }
      return '+' + phoneNumber.slice(0, 15);
    };

      return {

    const extractUsernameFromContact = (contact) => {
      const str = toSafeString(contact, '');
      const match = str.match(/@([a-zA-Z0-9_]+)/);
      return match ? `@${match[1]}` : '';
    };

    const buildClientsFromBookings = (bookings, existingClients) => {
      const finalClients = [];
      const manualClients = [];
      const realClientsMap = new Map();

      (existingClients || []).forEach(c => {
         if (!c || !c.tgId) return;
         if (String(c.tgId).startsWith('manual_')) {
             manualClients.push({...c});
         } else {
             realClientsMap.set(String(c.tgId), {...c});
         }
      });

      const statsMap = new Map();
      
      (bookings || []).forEach(raw => {
         const b = normalizeBooking(raw);
         if (!b.tgId) return;
         
         const isManualBooking = String(b.tgId).startsWith('manual_');
         const tgIdStr = String(b.tgId);
         
         if (!isManualBooking) {
             const cleanUser = b.clientContact ? b.clientContact.replace(/[@()]/g, '').trim().toLowerCase() : '';
             const cleanPhone = toSafeString(b.phone, '').replace(/[^\d]/g, '');
             
             const mIdx = manualClients.findIndex(mc => {
                const dbUser = mc.username ? mc.username.replace(/[@()]/g, '').trim().toLowerCase() : '';
                const dbPhone = mc.phone ? mc.phone.replace(/[^\d]/g, '') : '';
                return (cleanUser && dbUser === cleanUser) || (cleanPhone && dbPhone === cleanPhone);
             });
             
             if (mIdx !== -1) {
                 const mc = manualClients.splice(mIdx, 1)[0];
                 const oldTgId = mc.tgId;
                 mc.tgId = tgIdStr; 
                 realClientsMap.set(tgIdStr, mc);
                 
                 const userTgId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;
                 if (db && userTgId === ADMIN_TG_ID) {
                     db.collection("clients").doc(String(oldTgId)).delete().catch(e=>console.log(e));
                     db.collection("clients").doc(tgIdStr).set(mc).catch(e=>console.log(e));
                 }
             }
         }
         
         if (!isManualBooking) {
             const prev = statsMap.get(tgIdStr) || {
                 tgId: b.tgId,
                 originalName: b.clientName || 'Клиент',
                 customName: '',
                 username: extractUsernameFromContact(b.clientContact),
                 phone: toSafeString(b.phone, ''),
                 visits: 0,
                 totalSpent: 0,
                 isBlacklisted: false,
                 firstVisit: toSafeString(b.createdAt, new Date().toISOString())
             };
             prev.visits += 1;
             const paid = (raw.actualPrice !== undefined && raw.actualPrice !== null && raw.actualPrice !== '') ? Number(raw.actualPrice) : (Number(raw.price) || 0);
             prev.totalSpent += Number.isFinite(paid) ? paid : 0;
             if (!prev.phone && b.phone) prev.phone = b.phone;
             if (!prev.username) prev.username = extractUsernameFromContact(b.clientContact);
             if (!prev.originalName && b.clientName) prev.originalName = b.clientName;
             
             statsMap.set(tgIdStr, prev);
         }
      });

      statsMap.forEach((stat, key) => {
          const base = realClientsMap.get(key) || {};
          realClientsMap.set(key, {
              ...base,
              ...stat,
              originalName: toSafeString(base.originalName, stat.originalName),
              customName: toSafeString(base.customName, stat.customName || stat.originalName),

              phone: toSafeString(base.phone, stat.phone),
              isBlacklisted: !!base.isBlacklisted,
              isArchived: !!base.isArchived
          });
      });

      realClientsMap.forEach(c => finalClients.push(c));

              snap.forEach(doc => b.push(normalizeBooking(doc.data(), doc.id)));
              setBookingsList(b);

              setEditData(prevEdit => {
                const baseClients = prevEdit?.clients || [];
                const mergedClients = buildClientsFromBookings(b, baseClients);
                
                const baseIds = new Set(baseClients.map(c => String(c.tgId)));
                mergedClients.forEach(c => {
                  if (!c || c.tgId === undefined || c.tgId === null) return;
                  const id = String(c.tgId);
                  if (baseIds.has(id)) return;
                  db.collection("clients").doc(id).set(c).catch(console.error);
                });

                return prevEdit ? { ...prevEdit, clients: mergedClients } : prevEdit;
              });

              setAppData(prevApp => {
                const baseClients = prevApp?.clients || [];
                const mergedClients = buildClientsFromBookings(b, baseClients);
                return prevApp ? { ...prevApp, clients: mergedClients } : prevApp;
              });

              setLoadingBookings(false);
            },
            (error) => {
              console.error("Ошибка слушателя записей:", error);
              setLoadingBookings(false);
            }
          );
        } catch(e) { 
          console.error("Ошибка запуска onSnapshot:", e); 
          setLoadingBookings(false);
        }
      };

      useEffect(() => {
        if (activeTab === 'admin' && (adminTab === 'calendar' || adminTab === 'clients')) {
            fetchBookings();

           }
        }

        const loadDatabase = async () => {
          let finalData = { ...initialMasterData };

          const saved = localStorage.getItem('electroAppData');
          if (saved) {
            try {
              finalData = { ...initialMasterData, ...JSON.parse(saved) };
            } catch (e) {}
          }

          if (db) {
            try {
              const doc = await db.collection("settings").doc("masterData").get();
              setDbConnected(true);
              
              if (doc.exists) {
                finalData = { ...initialMasterData, ...finalData, ...doc.data() };
                
                finalData.stories = finalData.stories || initialMasterData.stories;
                finalData.services = finalData.services || initialMasterData.services;
                finalData.addons = finalData.addons || initialMasterData.addons;
                finalData.dates = finalData.dates || initialMasterData.dates;
                finalData.memo = finalData.memo || initialMasterData.memo;
                finalData.defaultSlots = finalData.defaultSlots || initialMasterData.defaultSlots;

                if (finalData.stories.length > 0 && typeof finalData.stories[0] === 'string') {
                  finalData.stories = finalData.stories.map((name, i) => ({
                    id: 'st' + i, name: name, type: name.toLowerCase() === 'отзывы' ? 'reviews' : 'page', content: '', images: []
                  }));
                }
                if (finalData.slots && Array.isArray(finalData.slots)) {
                  finalData.dates = finalData.dates.map(d => ({ ...d, slots: d.slots ? d.slots : finalData.slots }));
                  delete finalData.slots;
                }
                finalData.dates = finalData.dates.map(d => ({...d, slots: d.slots || []}));

                finalData.dates = finalData.dates.map(d => {
                    if (d.date && !d.date.includes('-')) {
                        const match = globalCalendarDays.find(g => parseDateForDisplay(g.date).short === d.date);
                        if (match) return { ...d, date: match.date };
                    }
                    return d;
                });

                if (finalData.mapLink === undefined) finalData.mapLink = "";
                
                const userTgId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;
                if (userTgId === ADMIN_TG_ID) {
                   try {
                     const snap = await db.collection("clients").get();
                     let cList = [];
                     snap.forEach(d => cList.push(d.data()));
                     
                     finalData.clients = cList.length > 0 ? cList : (finalData.clients || []);
                     
                     if (cList.length === 0 && finalData.clients.length > 0) {
                         finalData.clients.forEach(c => db.collection("clients").doc(String(c.tgId)).set(c).catch(console.error));
                     }
                   } catch(err) {
                     finalData.clients = finalData.clients || [];
                   }
                } else {
                   finalData.clients = [];
                }
              }
            } catch(err) {
              setDbConnected(false); 
              console.error("Firebase load error:", err);
            }
          }

          setAppData(finalData);
          setEditData(finalData);
          setIsAppReady(true);
        };

        if (db) {
          const auth = firebase.auth();

          const unsubscribe = auth.onAuthStateChanged(async (user) => {
            if (userTgId === ADMIN_TG_ID) {
              if (!user || user.email !== 'boss@electro.app') {

                setShowAdminAuth(false);
                loadDatabase();
              }
            } else {
              if (!user) {
                try {
                  await auth.signInAnonymously();
                  return; 
                } catch (e) {
                  console.error("Auth client error:", e);
                  loadDatabase(); 
                }
              } else {
                loadDatabase();
              }
            }
          });
          
          return () => unsubscribe();
        } else {
          loadDatabase();
        }
      }, []);

            await db.collection("settings").doc("masterData").set(dataToSave);

             />
             <button

             >

      if (!isAppReady || (!appData && !showAdminAuth)) {
        return (
          <div className="boot-loader-shell">

              <div className="boot-loader__halo"></div>
              <div className="boot-loader__ring boot-loader__ring--outer"></div>
              <div className="boot-loader__ring boot-loader__ring--inner"></div>
              <div className="boot-loader__core"></div>
              <p className="boot-loader__text">ЗАГРУЗКА</p>
            </div>
          </div>
        );
      }

      const addonsPrice = (selectedAddons || []).reduce((sum, addon) => sum + parseInt(addon.price), 0);
      const totalPrice = (selectedDuration * appData.pricePerMinute) + addonsPrice;

      // ==========================================
      // ЗАЩИТА ОТ НАКЛАДОК ПЕРЕД ОКОНЧАТЕЛЬНОЙ ЗАПИСЬЮ
      // ==========================================
      const handlePreBooking = () => {
        if (selectedDate && selectedTime) {
            const targetDate = (appData.dates || []).find(d => d.date === selectedDate);
            if (targetDate) {
                const currentSlots = targetDate.slots || [];
                const templateSlots = appData.defaultSlots || [];
                
                const [h, m] = selectedTime.split(':').map(Number);
                const startMins = h * 60 + m;
                const endMins = startMins + selectedDuration;
                
                let hasOverlap = false;
                
                for (let i = 0; i < templateSlots.length; i++) {
                    const t = templateSlots[i];
                    const [th, tm] = t.split(':').map(Number);
                    const tMins = th * 60 + tm;
                    
                    if (tMins > startMins && tMins < endMins) {
                        if (!currentSlots.includes(t)) {
                            hasOverlap = true;
                            break;
                        }
                    }
                }
                
                if (hasOverlap) {
                    triggerHaptic();
                    setShowOverlapModal(true);
                    return; 
                }
            }
        }
        setShowMemo(true);
      };

      const isUserBlacklisted = () => {
        const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || {};
        if (!tgUser.id) return false;
        const client = (appData.clients || []).find(c => c.tgId === tgUser.id);
        return client?.isBlacklisted || false;
      };

      const isExistingClient = () => {
        const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || {};
        if (!tgUser.id) return false;
        return (appData.clients || []).some(c => c.tgId === tgUser.id);
      };

      // =========================================================================
      // АЛГОРИТМ ЗАПИСИ ИЗ ВАШЕГО ОБРАЗЦА
      // =========================================================================
      const handleFinalBooking = async () => {
        if (!isExistingClient() && (!clientPhone || !clientPhone.trim())) {
           alert("Пожалуйста, введите ваш номер телефона!");
           return;
        }

        triggerHaptic();
        setShowMemo(false); 

        const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || {};
        const clientName = tgUser.first_name ? `${tgUser.first_name} ${tgUser.last_name || ''}`.trim() : "Неизвестный клиент";
        const clientUsername = tgUser.username ? `(@${tgUser.username})` : "";
        const clientId = tgUser.id ? `(ID: ${tgUser.id})` : "";

        const servicesList = (selectedServices || []).map(s => s.name).join(', ');
        const addonsList = (selectedAddons || []).length > 0 ? `\n➕ Допы: ${selectedAddons.map(a => a.name).join(', ')}` : '';
        
        let updatedClients = [...(appData.clients || [])];
        let finalClientName = clientName;
        
        if (tgUser.id) {
            const cleanTgUsername = clientUsername ? clientUsername.replace(/[@()]/g, '').trim().toLowerCase() : '';
            const cleanTgPhone = clientPhone ? clientPhone.replace(/[^\d]/g, '') : '';

            let cIdx = updatedClients.findIndex(c => c.tgId === tgUser.id);

            if (cIdx === -1) {
                 cIdx = updatedClients.findIndex(c => {
                    if (!String(c.tgId).startsWith('manual_')) return false;
                    const dbUser = c.username ? c.username.replace(/[@()]/g, '').trim().toLowerCase() : '';
                    const dbPhone = c.phone ? c.phone.replace(/[^\d]/g, '') : '';
                    return (cleanTgUsername && dbUser === cleanTgUsername) || (cleanTgPhone && dbPhone === cleanTgPhone);
                 });
            }

            let finalClientObj;
            if (cIdx !== -1) {
                const oldTgId = updatedClients[cIdx].tgId;
                if (String(oldTgId).startsWith('manual_') && oldTgId !== tgUser.id) {
                     deleteClientFromFirebase(oldTgId);
                }
                updatedClients[cIdx].tgId = tgUser.id; 
                updatedClients[cIdx].visits = (updatedClients[cIdx].visits || 0) + 1;
                if (clientUsername && !updatedClients[cIdx].username) updatedClients[cIdx].username = clientUsername;
                if (clientPhone && !updatedClients[cIdx].phone) updatedClients[cIdx].phone = clientPhone;

                finalClientName = updatedClients[cIdx].customName || updatedClients[cIdx].originalName || clientName;
                finalClientObj = updatedClients[cIdx];
            } else {
                finalClientObj = {
                    tgId: tgUser.id,
                    originalName: clientName,
                    customName: '',
                    username: clientUsername,
                    phone: clientPhone,
                    visits: 1,
                    totalSpent: totalPrice,
                    isBlacklisted: false,
                    isArchived: false,
                    firstVisit: new Date().toISOString()
                };
                updatedClients.push(finalClientObj);
            }
            saveClientToFirebase(finalClientObj);
        }
        
        const escapeMD = (str) => String(str || '').replace(/([_*\[\]`\\])/g, '\\$1');
        const safeName = escapeMD(finalClientName);
        const safeUsername = escapeMD(clientUsername);
        const safePhone = escapeMD(clientPhone);
        const safeServices = escapeMD(servicesList);
        const safeAddons = escapeMD(addonsList);

        const displayDate = parseDateForDisplay(selectedDate).full;

        const newBooking = {
          id: 'b' + Date.now(),
          date: selectedDate,
          time: selectedTime,
          clientName: finalClientName,
          clientContact: clientUsername || clientId || "Нет данных",
          phone: clientPhone,
          services: servicesList + addonsList,
          duration: selectedDuration,
          price: totalPrice,
          tgId: tgUser.id || null,
          createdAt: new Date().toISOString()
        };

        try {
            if (db) {
                await db.collection("bookings").doc(newBooking.id).set(newBooking);
            }
            
            const messageToAdmin = `🔥 *Новая запись!*\n\n` +
                            `👤 Клиент: ${safeName} ${safeUsername} ${clientId}\n` +
                            (clientPhone ? `📞 Телефон: ${safePhone}\n` : ``) +
                            `📅 ${displayDate} в ${selectedTime}\n` +
                            `🌸 Зоны: ${safeServices}${safeAddons}\n` +
                            `⏳ Забронировано: ${selectedDuration} мин\n` +
                            `💰 Ожидаемая сумма: ~${totalPrice} ₽`;

            if (GOOGLE_SCRIPT_URL) {
              const initData = window.Telegram?.WebApp?.initData || ''; 
              const fetchOpts = (payload) => ({
                method: 'POST',
                keepalive: true, 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({...payload, initData: initData}) 
              });

              fetch(GOOGLE_SCRIPT_URL, fetchOpts({ chat_id: CHAT_ID, text: messageToAdmin }))
                 .catch(error => console.error("Ошибка отправки админу", error));

              if (tgUser.id) {
                const safeAddress = escapeMD(appData.address);
                const safeNote = escapeMD(appData.addressNote);
                const messageToClient = `✨ *${safeName}, ваша запись подтверждена!*\n\n📅 Дата: ${displayDate}\n⏰ Время: ${selectedTime}\n🌸 Зоны: ${safeServices}${safeAddons}\n⏳ Примерное время: ${selectedDuration} мин\n💰 Примерная стоимость: ~${totalPrice} ₽\n\n📍 Адрес: ${safeAddress}\n_${safeNote}_\n\nЖду вас! ❤️`;
                fetch(GOOGLE_SCRIPT_URL, fetchOpts({ chat_id: tgUser.id, text: messageToClient }))
                   .catch(error => console.error("Ошибка отправки клиенту", error));
              }

            setActiveTab('success');
            
            const newData = { ...appData, clients: updatedClients };
            setAppData(newData);
            setEditData(newData);
            saveToLocalCache(newData); // ШАГ 8

        } catch (err) {

      // БРОНЕБОЙНАЯ ФУНКЦИЯ ОТКРЫТИЯ РЕДАКТИРОВАНИЯ
      const openEditBooking = (b) => {
          try {
            triggerHaptic();
            const safeB = normalizeBooking(b);
            setEditBDate(safeB.date || "");
            setEditBTime(safeB.time || "14:00");

      // =========================================================================
      // АЛГОРИТМ РЕДАКТИРОВАНИЯ С УМНЫМ ВОССТАНОВЛЕНИЕМ
      // =========================================================================
      const confirmEditBooking = async () => {
          if(!editingBooking) return;
          const safeDuration = Number(editBDuration);
          if(!editBDate || !editBTime || !Number.isFinite(safeDuration) || safeDuration <= 0 || !toSafeString(editBName, '').trim()) {
              return alert("Заполните все поля: имя, дату, время и длительность!");
          }
          triggerHaptic();

          const updatedB = normalizeBooking({ ...editingBooking, date: editBDate, time: editBTime, duration: safeDuration, clientName: editBName, services: editBServices });
          
          setBookingsList(prev => prev.map(b => String(b.id || '') === String(updatedB.id || '') ? updatedB : b));

          try {
            if(db && updatedB.id) await db.collection("bookings").doc(String(updatedB.id)).update({
                date: updatedB.date, time: updatedB.time, duration: updatedB.duration, clientName: updatedB.clientName, services: updatedB.services
            });

            const newDates = [...(editData.dates || [])];
            
            if (editingBooking.date !== editBDate || editingBooking.time !== editBTime || editingBooking.duration !== safeDuration) {
                const oldDIdx = newDates.findIndex(d => d.date === editingBooking.date);

                    newDates[oldDIdx].slots = restoreOverlappingSlots(

                        editingBooking.time,
                        editingBooking.duration,
                        editData.defaultSlots || appData.defaultSlots
                    );
                }
            }
            
            const newDIdx = newDates.findIndex(d => d.date === editBDate);
            if (newDIdx !== -1) {
                newDates[newDIdx].slots = removeOverlappingSlots(newDates[newDIdx].slots, editBTime, safeDuration);

            const newData = {...editData, dates: newDates};
            setEditData(newData);
            setAppData(newData);

            if (viewingBookingDetails && viewingBookingDetails.id === updatedB.id) {
                setViewingBookingDetails(updatedB);
            }
            showToast("Запись успешно обновлена! ✏️");
          } catch(e) {
            showToast("Ошибка сохранения ❌");
            console.error(e);
          }
      };

      // =========================================================================
      // АЛГОРИТМ ОТМЕНЫ С УМНЫМ ВОССТАНОВЛЕНИЕМ СЛОТОВ
      // =========================================================================
      const handleDeleteBookingGlobal = async (booking) => {
          triggerHaptic();

            const newDates = [...(editData?.dates || appData?.dates || [])];
            const templateSlots = editData?.defaultSlots || appData?.defaultSlots || [];
            const dIdx = newDates.findIndex(d => d.date === booking.date);
            
            if (dIdx !== -1) {

                    newDates[dIdx].slots,
                    booking.time,
                    booking.duration,

                       date: booking.date, 
                       day: gDay.day,

        const getMonthGrid = (date) => {
          const year = date.getFullYear();
          const month = date.getMonth();
          const firstDay = new Date(year, month, 1);
          const lastDay = new Date(year, month + 1, 0);
          let startingDayOfWeek = firstDay.getDay();
          if (startingDayOfWeek === 0) startingDayOfWeek = 7;
          const grid = [];
          for (let i = 1; i < startingDayOfWeek; i++) {
             grid.push({ dateObj: new Date(year, month, 1 - (startingDayOfWeek - i)), isCurrentMonth: false });
          }
          for (let i = 1; i <= lastDay.getDate(); i++) {
             grid.push({ dateObj: new Date(year, month, i), isCurrentMonth: true });
          }
          let remaining = grid.length % 7;
          if (remaining !== 0) {
             for (let i = 1; i <= 7 - remaining; i++) {
                 grid.push({ dateObj: new Date(year, month + 1, i), isCurrentMonth: false });
             }
          }
          return grid;
        };

                             const endM = endTotal % 60;
                             const endTimeStr = `${String(endH).padStart(2, '0')}:${String(endM).padStart(2, '0')}`;

                             // Для красивого отображения ищем ТГ ID вручную, если его нет
                             let realTgId = b.tgId;
                             if (!realTgId || String(realTgId).startsWith('manual_')) {
                                 const allClients = editData?.clients || appData?.clients || [];
                                 const matchedClient = allClients.find(c => {
                                     const cUser = c.username ? c.username.replace(/[@()]/g, '').trim().toLowerCase() : '';
                                     const bUser = b.clientContact ? b.clientContact.replace(/[@()]/g, '').trim().toLowerCase() : '';
                                     const matchUsername = cUser.length > 2 && bUser.length > 2 && (bUser.includes(cUser) || cUser.includes(bUser));
                                     
                                     const cPhone = c.phone ? c.phone.replace(/[^\d]/g, '') : '';
                                     const bPhone = b.phone ? b.phone.replace(/[^\d]/g, '') : '';
                                     const matchPhone = cPhone.length > 6 && bPhone.length > 6 && cPhone === bPhone;
                                     
                                     const matchName = b.clientName && b.clientName.length > 2 && ((b.clientName === c.customName) || (b.clientName === c.originalName));
                                     
                                     return matchUsername || matchPhone || matchName;
                                 });
                                 if (matchedClient && matchedClient.tgId && !String(matchedClient.tgId).startsWith('manual_')) {
                                     realTgId = matchedClient.tgId;
                                 }
                             }
                             const enhancedBooking = { ...b, tgId: realTgId };

                             return (
                                 <div key={b.id} onClick={() => { triggerHaptic(); setViewingBookingDetails(enhancedBooking); }} className="flex items-center justify-between py-3.5 border-b border-gray-800/60 last:border-0 cursor-pointer active:bg-white/5 transition-colors pl-2 pr-1">
                                     <div className="flex items-center gap-3">
                                         <div className="w-[3px] h-10 bg-[#C89D7C] rounded-full"></div>
                                         <span className="text-white font-medium text-[16px] truncate max-w-[180px]">{b.clientName}</span>
                                     </div>
                                     <div className="flex flex-col items-end text-xs text-gray-400 font-medium tracking-wide">
                                         <span className="text-gray-300">{b.time}</span>
                                         <span>{endTimeStr}</span>
                                     </div>
                                 </div>
                             )
                          })
                      }
                      {bookingsList.filter(b => b.date === adminCalendarDate).length === 0 && (
                          <p className="text-gray-500 text-center py-10 text-sm">Нет событий</p>
                      )}
                    </div>

                  </div>
                )}
              </React.Fragment>
            ) : adminSubView === 'edit_client' ? (
               /* РЕДАКТИРОВАНИЕ КЛИЕНТА */
               <div className="space-y-4 animate-[fadeIn_0.3s_ease-out] pb-28 pt-2">
                 <div className="flex items-center gap-3 mb-6">
                    <h2 className="text-2xl font-bold text-white">Правка клиента</h2>
                 </div>
                 {(()=>{
                    const client = (editData.clients || []).find(c => c.tgId === editingClientTgId);
                    if (!client) return <p className="text-gray-500">Клиент не найден.</p>;
                    return (
                       <div className="glass-card-dark p-5 rounded-3xl border border-white/10 space-y-5">
                          <div>
                              <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1.5">ФИО клиента</label>
                              <input 
                                value={client.customName || ''} 
                                onChange={(e) => handleClientChange(client.tgId, 'customName', e.target.value)} 
                                placeholder={client.originalName || "Имя не указано"} 
                                className="w-full bg-[#1A1A1A] border border-gray-700 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-[#C89D7C] transition-colors" 
                              />
                          </div>
                          <div>
                              <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1.5">Ник в Telegram</label>
                              <input 
                                value={client.username || ''} 
                                onChange={(e) => handleClientChange(client.tgId, 'username', e.target.value)} 
                                placeholder="@username" 
                                className="w-full bg-[#1A1A1A] border border-gray-700 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-[#C89D7C] transition-colors" 
                              />
                          </div>
                          <div>
                              <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1.5">Телефон</label>
                              <input 
                                type="tel" inputMode="tel"
                                value={client.phone || ''} 
                                onChange={(e) => handleClientChange(client.tgId, 'phone', formatPhoneNumber(e.target.value))} 
                                placeholder="+7 (000) 000-00-00" 
                                className="w-full bg-[#1A1A1A] border border-gray-700 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-[#C89D7C] transition-colors" 
                              />
                          </div>
                       </div>
                    )
                 })()}
               </div>
            ) : (
              /* РЕЖИМ МОДЕРАЦИИ ОТЗЫВОВ */
              <div className="space-y-4 animate-[fadeIn_0.3s_ease-out] pb-28">
                <h2 className="text-2xl font-bold text-white mb-6">Модерация отзывов</h2>
                {allReviews.length === 0 ? (
                  <p className="text-xs text-gray-500">Отзывов пока нет.</p>
                ) : (
                  allReviews.map(rev => (
                    <div key={rev.id} className={`p-5 rounded-2xl border ${rev.approved ? 'border-green-500/30 bg-green-500/10' : 'border-[#C89D7C]/50 bg-[#C89D7C]/10'} relative glass-card-dark`}>
                      <div className="flex justify-between items-start mb-2">
                        <span className="font-bold text-white text-base">{rev.name} <span className="text-[#C89D7C]">({rev.rating}⭐)</span></span>
                        <span className={`text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider ${rev.approved ? 'bg-green-500/20 text-green-400' : 'bg-[#C89D7C]/20 text-[#C89D7C]'}`}>
                          {rev.approved ? '✅ Опубликован' : '⏳ Модерация'}
                        </span>
                      </div>
                      <p className="text-sm text-gray-300 mb-4">{rev.text}</p>
                      <div className="flex gap-2">
                        {!rev.approved && (
                          <button onClick={() => approveReview(rev.id)} className="flex-1 bg-green-600 hover:bg-green-500 text-white px-3 py-2 rounded-xl text-sm font-bold transition-colors shadow-lg">
                            Одобрить
                          </button>
                        )}
                        <button onClick={() => deleteReviewAdmin(rev.id)} className="flex-1 bg-red-600/80 hover:bg-red-500 text-white px-3 py-2 rounded-xl text-sm font-bold transition-colors shadow-lg">
                          Удалить
                        </button>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* НИЖНЯЯ ПАНЕЛЬ АДМИНКИ (STICKY BAR) - СКРЫВАЕТСЯ ПРИ ПРОСМОТРЕ ДЕТАЛЕЙ ЗАПИСИ */}
            {(!viewingBookingDetails) && (
                <div className="fixed bottom-0 left-0 right-0 p-3 bg-[#1A1A1A]/80 backdrop-blur-xl border-t border-white/5 max-w-md mx-auto z-50 flex gap-2">
                  {adminSubView === 'main' ? (
                    <React.Fragment>
                      <button onClick={() => {triggerHaptic(); setAdminSubView('mod');}} className="flex-[1] bg-[#2A2A2A] text-[#C89D7C] rounded-xl font-bold py-2 text-sm border border-white/5 relative hover:bg-[#333] transition-colors shadow-sm">
                        Мод.
                        {unapprovedCount > 0 && (
                          <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold shadow-md animate-pulse">
                            {unapprovedCount}
                          </span>
                        )}
                      </button>
                      <button onClick={saveChanges} disabled={isSaving} className="flex-[2] bg-gradient-to-r from-[#C89D7C] to-[#9A6A45] text-black font-bold py-2 text-sm rounded-xl shadow-md disabled:opacity-50 hover:opacity-90 transition-opacity">
                        {isSaving ? "Сохранение..." : "Сохранить"}
                      </button>
                      <button onClick={() => {triggerHaptic(); setActiveTab('main');}} className="flex-[1] bg-red-500/10 text-red-400 font-bold py-2 text-sm rounded-xl border border-red-500/20 hover:bg-red-500/20 transition-colors shadow-sm">
                        Закрыть
                      </button>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <button onClick={() => {triggerHaptic(); setAdminSubView('main'); setEditingClientTgId(null);}} className="flex-[1] bg-[#2A2A2A] text-white rounded-xl font-bold py-2 text-sm border border-white/5 hover:bg-[#333] transition-colors shadow-sm">
                        Назад
                      </button>
                      <button onClick={saveChanges} disabled={isSaving} className="flex-[2] bg-gradient-to-r from-[#C89D7C] to-[#9A6A45] text-black font-bold py-2 text-sm rounded-xl shadow-md disabled:opacity-50 hover:opacity-90 transition-opacity">
                        {isSaving ? "Сохранение..." : "Сохранить"}
                      </button>
                    </React.Fragment>
                  )}
                </div>
            )}

          </React.Fragment>
        );
      };

      return (
        <div className="max-w-md mx-auto min-h-[100dvh] w-full relative shadow-2xl bg-black/40 border-x border-white/5 overflow-x-hidden">
          
          {/* ТОЧКА СТАТУСА FIREBASE (СВЕТОФОР) */}
          <div 
            className={`fixed top-4 right-4 w-2.5 h-2.5 rounded-full z-[60] transition-colors duration-500 ${dbConnected ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]'}`} 
            title={dbConnected ? "Облако подключено" : "Нет связи с облаком"}
          ></div>

          {/* ШЕСТЕРЕНКА АДМИНА */}
          {showAdminGear && (
            <div onClick={() => { triggerHaptic(); setActiveTab('admin'); setShowAdminGear(false); }} 
                 className="fixed top-4 left-4 bg-[#1A1A1A] p-3 rounded-full border border-[#C89D7C] cursor-pointer shadow-[0_0_20px_rgba(200,157,124,0.6)] animate-[zoomIn_0.3s_ease-out] z-[9999] flex items-center justify-center">
              <Icon name="Settings" className="w-7 h-7 text-[#C89D7C] animate-[spin_3s_linear_infinite]" />
            </div>
          )}

          {/* ВСПЛЫВАЮЩИЕ УВЕДОМЛЕНИЯ (TOAST) */}
          {toastMsg && (
            <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[9999] bg-green-600/90 text-white px-6 py-3 rounded-full shadow-[0_5px_20px_rgba(34,197,94,0.4)] backdrop-blur-md font-bold text-sm animate-[fadeIn_0.3s_ease-out] border border-green-400/30 whitespace-nowrap">
              {toastMsg}
            </div>
          )}

          {activeTab === 'main' && appData && renderMain()}
          {activeTab === 'booking' && appData && renderBooking()}
          {activeTab === 'success' && appData && renderSuccess()}
          {activeTab === 'admin' && appData && renderAdminPanel()}
          {activeTab === 'reviews' && appData && renderReviews()}
          {activeTab === 'story_page' && appData && renderStoryPage()}

          {/* ВСПЛЫВАЮЩАЯ ГАЛЕРЕЯ (МОДАЛЬНОЕ ОКНО) */}
          {viewingStory && viewingStory.type === 'gallery' && (
            <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4 animate-[fadeIn_0.3s_ease-out]">
              <div className="bg-[#1A1A1A] border border-[#C89D7C]/30 rounded-3xl w-full max-sm overflow-hidden relative shadow-2xl">
                <button onClick={() => { triggerHaptic(); setViewingStory(null); }} className="absolute top-3 right-3 z-10 w-8 h-8 bg-black/50 rounded-full text-white flex items-center justify-center font-bold text-xl pb-1">×</button>
                <div className="w-full aspect-[3/4] max-h-[70vh] bg-black relative">
                  {viewingStory.images[storyImageIdx] ? (
                    <img src={viewingStory.images[storyImageIdx]} className="w-full h-full object-cover" />
                  ) : (
                    <div className="w-full h-full flex items-center justify-center text-gray-500">Нет фото</div>
                  )}
                  {storyImageIdx > 0 && (
                    <button onClick={() => { triggerHaptic(); setStoryImageIdx(prev=>prev-1); }} className="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/50 text-white rounded-full flex items-center justify-center font-bold">‹</button>
                  )}
                  {storyImageIdx < viewingStory.images.length - 1 && (
                    <button onClick={() => { triggerHaptic(); setStoryImageIdx(prev=>prev+1); }} className="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/50 text-white rounded-full flex items-center justify-center font-bold">›</button>
                  )}
                </div>
                <div className="p-4 text-center">
                  <h3 className="font-bold text-white mb-1">{viewingStory.name}</h3>
                  <p className="text-xs text-gray-400">{storyImageIdx + 1} / {viewingStory.images.length || 0}</p>
                </div>
              </div>
            </div>
          )}

          {/* ИНСТА-СТОРИЗ (НА ВЕСЬ ЭКРАН) */}
          {viewingStory && viewingStory.type === 'insta' && (
            <div className="fixed inset-0 z-[100] bg-black flex flex-col animate-[fadeIn_0.2s_ease-out]">
              <div className="absolute top-0 left-0 right-0 p-4 flex gap-1 z-20 pt-6">
                {viewingStory.images.map((_, i) => (
                  <div key={i} className={`h-1 flex-1 rounded-full ${i === storyImageIdx ? 'bg-white' : 'bg-white/30'}`} />
                ))}
              </div>
              <button onClick={() => { triggerHaptic(); setViewingStory(null); }} className="absolute top-10 right-4 z-20 w-8 h-8 bg-black/30 rounded-full text-white flex items-center justify-center font-bold text-xl pb-1">×</button>
              
              <div className="flex-1 relative flex items-center justify-center">
                {viewingStory.images[storyImageIdx] ? (
                  <img src={viewingStory.images[storyImageIdx]} className="w-full h-full object-cover" />
                ) : (
                  <span className="text-gray-500">Нет фото</span>
                )}
                
                {/* Невидимые зоны для тапов */}
                <div className="absolute top-0 left-0 w-1/3 h-full z-10" onClick={() => { 
                  triggerHaptic(); 
                  if (storyImageIdx > 0) setStoryImageIdx(storyImageIdx - 1); 
                }}></div>
                <div className="absolute top-0 right-0 w-2/3 h-full z-10" onClick={() => { 
                  triggerHaptic(); 
                  if (storyImageIdx < viewingStory.images.length - 1) setStoryImageIdx(storyImageIdx + 1); 
                  else setViewingStory(null); 
                }}></div>
              </div>
            </div>
          )}

          {showOverlapModal && renderOverlapModal()}
          {showMemo && renderMemoModal()}

          {/* ВСПЛЫВАЮЩЕЕ ОКНО РЕДАКТИРОВАНИЯ ЗАПИСИ */}
          {editingBooking && (
            <div className="fixed inset-0 z-[250] bg-black/80 backdrop-blur-md flex items-center justify-center p-4 animate-[fadeIn_0.3s_ease-out]">
              <div className="bg-[#1A1A1A] border border-[#C89D7C]/30 rounded-3xl w-full max-w-sm p-6 shadow-[0_0_40px_rgba(200,157,124,0.15)]">
                <h3 className="text-xl font-bold text-white mb-4">Редактировать запись</h3>

                <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">ФИО клиента</label>
                <input 
                   type="text" 
                   value={editBName} 
                   onChange={e => setEditBName(e.target.value)} 
                   className="w-full bg-[#2A2A2A] rounded-xl p-3 text-white text-sm mb-4 focus:outline-none focus:border-[#C89D7C] border border-transparent" 
                />

                <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Зоны (Услуги)</label>
                <input 
                   type="text" 
                   value={editBServices} 
                   onChange={e => setEditBServices(e.target.value)} 
                   className="w-full bg-[#2A2A2A] rounded-xl p-3 text-white text-sm mb-4 focus:outline-none focus:border-[#C89D7C] border border-transparent" 
                />

                <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Дата</label>
                <div className="mb-4">
                   <GlassSelect value={editBDate} options={dateOptions} onChange={setEditBDate} placeholder="Выберите дату" />
                </div>

                <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Время</label>
                <div className="mb-4">
                   <GlassTimePicker value={editBTime} onChange={setEditBTime} />
                </div>

                <label className="block text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Длительность (минут)</label>
                <input 
                   type="number" step="15" 
                   value={editBDuration} 
                   onChange={e => setEditBDuration(e.target.value === '' ? '' : Number(e.target.value))} 
                   className="w-full bg-[#2A2A2A] rounded-xl p-3 text-white text-sm mb-6 focus:outline-none focus:border-[#C89D7C] border border-transparent" 
                />

                <div className="flex gap-3">
                  <button onClick={() => { setEditingBooking(null); }} className="flex-1 py-3 rounded-xl border border-gray-700 text-gray-400 font-medium hover:bg-gray-800 transition-colors">Отмена</button>
                  <button onClick={confirmEditBooking} className="flex-[2] py-3 rounded-xl bg-gradient-to-r from-[#C89D7C] to-[#9A6A45] text-black font-bold shadow-lg">Сохранить</button>
                </div>
              </div>
            </div>
          )}

          {activeTab === 'main' && selectedServices.length > 0 && (
            <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto animate-[slideInUp_0.3s_ease-out] z-50">
              <div className="bg-[#1A1A1A]/95 backdrop-blur-xl border-t border-x border-[#C89D7C]/30 rounded-t-3xl p-5 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                <div className="mb-5">
                  <div className="flex justify-between items-end mb-4">
                    <div className="flex flex-col">
                      <span className="text-3xl font-bold text-[#C89D7C]">{selectedDuration} <span className="text-lg text-gray-400 font-medium">мин</span></span>
                    </div>
                    <div className="flex flex-col items-end">
                      <span className="text-xs text-gray-500 mb-1">Примерно</span>
                      <span className="text-xl font-bold text-white">~ {totalPrice} ₽</span>
                    </div>
                  </div>
                  <input 
                    type="range" min="30" max="720" step="15" 
                    value={selectedDuration} 
                    onChange={(e) => setSelectedDuration(parseInt(e.target.value))}
                    className="w-full accent-[#C89D7C] h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer"
                    style={{ touchAction: 'none' }}
                  />
                  <div className="flex justify-between text-[10px] text-gray-500 mt-2 font-medium">
                    <span>30 мин</span><span>3 ч</span><span>6 ч</span><span>12 ч</span>
                  </div>
                </div>
                <button onClick={() => { triggerHaptic(); setActiveTab('booking'); }} className="w-full bg-gradient-to-r from-[#C89D7C] to-[#9A6A45] text-black p-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 font-bold text-lg">
                  Выбрать дату
                  <Icon name="ChevronLeft" className="w-5 h-5 rotate-180" />
                </button>
              </div>
            </div>
          )}

          {activeTab === 'booking' && selectedDate && selectedTime && (
             <div className="fixed bottom-0 left-0 right-0 p-4 max-w-md mx-auto animate-[slideInUp_0.3s_ease-out] z-50">
             <button onClick={handlePreBooking} className="w-full bg-gradient-to-r from-[#C89D7C] to-[#9A6A45] text-black p-4 rounded-3xl shadow-[0_10px_40px_rgba(200,157,124,0.2)] flex items-center justify-center gap-2 font-bold text-lg">
               Подтвердить запись
             </button>
           </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
